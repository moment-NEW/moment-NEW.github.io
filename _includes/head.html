    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="description" content="{{ site.description }}">
    <meta name="keywords"  content="{{ site.keyword }}">
    <meta name="theme-color" content="{{ site.chrome-tab-theme-color }}">
    
    <title>{% if page.title %}{{ page.title }} - {{ site.SEOTitle }}{% else %}{{ site.SEOTitle }}{% endif %}</title>

    <!-- Web App Manifest -->

    <!-- Safari Webpage Icon    by-BY -->

    <!-- Bootstrap Core CSS -->

    <!-- Custom CSS -->

    <!-- Custom Fonts -->

    <!-- Soviet Constructivism / Avant-Garde Aesthetic Overrides -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Mono:wght@500;700&family=Oswald:wght@500;700&display=swap');

        :root {
            /* Constructivist Color Palette - Shifted to High Visibility Orange */
            --sov-red: #FF5722;         /* Vibrant Brutalist Orange */
            --sov-black: #1a1a1a;       /* Pitch dark grey/black */
            --sov-paper: #f4f4f0;       /* Off-white paper (better readability) */
            --sov-white: #ffffff;       /* Pure white */
            
            --sov-font-head: 'Anton', 'Oswald', sans-serif;
            --sov-font-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --sov-font-mono: 'Roboto Mono', monospace;
        }

        /* ── Base Reset & Body ─────────────────────────────────────────── */
        body {
            font-family: var(--sov-font-body) !important;
            background-color: var(--sov-paper) !important;
            color: var(--sov-black) !important;
            /* Lighter grunge texture so it does not distract from reading */
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.03"/></svg>');
        }
        
        body::after {
            display: none !important;
        }

        /* ── Typography & Links ────────────────────────────────────────── */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--sov-font-head) !important;
            color: var(--sov-black) !important;
            font-weight: normal !important;
            text-transform: uppercase !important;
            letter-spacing: 0.05em;
            line-height: 1.1;
        }

        a {
            color: var(--sov-red) !important;
            text-decoration: none !important;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: inset 0 -2px 0 var(--sov-red);
        }

        a:hover, a:focus {
            color: var(--sov-white) !important;
            background-color: var(--sov-red) !important;
            box-shadow: inset 0 -10px 0 var(--sov-red);
            text-decoration: none !important;
        }

        /* ── Navbar ────────────────────────────────────────────────────── */
        .navbar-default, .navbar-custom {
            background-color: var(--sov-black) !important;
            border-bottom: 8px solid var(--sov-red) !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            padding: 5px 0 !important;
        }
        .navbar-brand {
            font-family: var(--sov-font-head) !important;
            color: var(--sov-white) !important;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: var(--sov-red) !important;
            padding: 15px 20px !important;
            margin: 0 !important;
            border: none;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%);
        }
        .navbar-default .nav li a, .navbar-custom .nav li a {
            color: var(--sov-white) !important;
            font-family: var(--sov-font-head);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none !important;
            box-shadow: none !important;
        }
        .navbar-default .nav li a:hover, .navbar-custom .nav li a:hover {
            color: var(--sov-red) !important;
            background-color: transparent !important;
        }

        /* ── Page Header / Intro ───────────────────────────────────────── */
        .intro-header {
            position: relative;
            background-color: var(--sov-black) !important;
            background-blend-mode: luminosity !important;
            border-bottom: 20px solid var(--sov-red) !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            margin-bottom: 50px;
            padding-bottom: 60px;
            /* Geometric cutouts for the background */
            clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 100%, 0 90%);
        }
        
        .intro-header::before {
            content: "";
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 15px;
            background: var(--sov-red);
            z-index: 10;
        }

        .intro-header .site-heading, .intro-header .post-heading, .intro-header .page-heading {
            padding-top: 140px; /* Shift from center to lower for poster look */
            padding-bottom: 60px;
            text-align: left;
        }

        .intro-header .site-heading h1, .intro-header .post-heading h1, .intro-header .page-heading h1 {
            font-family: var(--sov-font-head) !important;
            color: var(--sov-white) !important;
            text-shadow: 4px 4px 0px var(--sov-red) !important;
            font-size: 5.5rem !important;
            border-bottom: none !important;
            display: inline-block;
            line-height: 0.9;
            margin-bottom: 20px;
        }

        .intro-header .subheading {
            font-family: var(--sov-font-mono) !important;
            color: var(--sov-black) !important;
            background-color: var(--sov-white) !important;
            font-weight: 700 !important;
            letter-spacing: 0.05em;
            text-shadow: none !important;
            font-size: 1.4rem !important;
            text-transform: uppercase !important;
            padding: 8px 15px;
            display: inline-block;
            box-shadow: 6px 6px 0px var(--sov-red);
        }
        
        /* ── Content Cards (Posts, Tags, About) ────────────────────────── */
        .post-container, .post-preview, .one-tag-list, .sidebar-container section, .catalog-container {
            background-color: var(--sov-paper) !important;
            border-radius: 0 !important;
            box-shadow: 8px 8px 0px var(--sov-black) !important;
            border: 4px solid var(--sov-black) !important;
            padding: 30px !important;
            margin-bottom: 40px !important;
            position: relative;
            transition: transform 0.1s ease, box-shadow 0.1s ease !important;
        }
        
        /* Add red geometric accent to cards */
        .post-container::before, .post-preview::before, .sidebar-container section::before {
            content: "";
            position: absolute;
            top: -4px; left: -4px;
            width: 30px; height: 30px;
            background-color: var(--sov-red);
            border: 4px solid var(--sov-black);
            z-index: 5;
        }

        /* ── Post Previews (Listings) ──────────────────────────────────── */
        .post-preview:hover {
            transform: translate(-4px, -4px) !important;
            box-shadow: 12px 12px 0px var(--sov-red) !important;
        }
        
        .post-title {
            font-family: var(--sov-font-head) !important;
            color: var(--sov-black) !important;
            font-size: 2.8rem !important;
            background: transparent !important;
            display: block !important;
            padding: 0 !important;
            line-height: 1;
        }
        
        .post-subtitle {
            color: var(--sov-red) !important;
            font-family: var(--sov-font-head) !important;
            font-weight: normal !important;
            font-size: 1.6rem !important;
            text-transform: uppercase;
        }
        
        .post-meta {
            color: var(--sov-white) !important;
            background-color: var(--sov-black) !important;
            font-style: normal !important;
            font-family: var(--sov-font-mono) !important;
            padding: 5px 10px !important;
            border: none !important;
            font-size: 1rem !important;
            margin-top: 15px !important;
            display: inline-block;
            text-transform: uppercase;
        }

        .post-content-preview {
            color: var(--sov-black) !important;
            line-height: 1.6;
            font-family: var(--sov-font-body);
            margin-top: 15px;
            border-top: 2px solid var(--sov-black);
            padding-top: 15px;
        }

        /* ── Tags Page Specifics ───────────────────────────────────────── */
        .tags a, #tag_cloud a {
            background-color: var(--sov-white) !important;
            color: var(--sov-black) !important;
            border: 3px solid var(--sov-black) !important;
            border-radius: 0 !important;
            padding: 8px 16px !important;
            font-family: var(--sov-font-head) !important;
            font-size: 1.4rem !important;
            text-transform: uppercase;
            margin: 0 10px 10px 0 !important;
            display: inline-block !important;
            box-shadow: 4px 4px 0px var(--sov-red) !important;
            transition: all 0.1s ease !important;
        }
        
        .tags a:hover, #tag_cloud a:hover {
            background-color: var(--sov-black) !important;
            color: var(--sov-white) !important;
            border-color: var(--sov-black) !important;
            box-shadow: -2px -2px 0px var(--sov-red) !important;
            transform: translate(2px, 2px);
        }

        .one-tag-list {
            border-top: 10px solid var(--sov-black) !important;
        }
        
        .one-tag-list .fa-tag {
            background-color: var(--sov-red) !important;
            font-size: 1.8rem !important;
            border: 4px solid var(--sov-black) !important;
            padding: 5px 15px !important;
            color: var(--sov-white) !important;
            margin-top: -35px !important;
            display: inline-block !important;
            box-shadow: 4px 4px 0px var(--sov-black);
        }

        /* ── Markdown/Prose Styling ────────────────────────────────────── */
        blockquote {
            font-family: var(--sov-font-head) !important;
            font-size: 1.8rem;
            line-height: 1.3;
            color: var(--sov-red) !important;
            border-left: 10px solid var(--sov-black) !important;
            background-color: transparent !important;
            padding: 20px 30px !important;
            border-radius: 0 !important;
            border-top: 2px solid var(--sov-black) !important;
            border-right: 2px solid var(--sov-black) !important;
            border-bottom: 2px solid var(--sov-black) !important;
            box-shadow: 8px 8px 0px var(--sov-black) !important;
            margin: 30px 0 !important;
            text-transform: uppercase;
        }

        /* Improved Code blocks specifically for readability */
        code, pre {
            background-color: #272822 !important; /* Clean dark theme background */
            border: none !important;
            border-left: 6px solid var(--sov-red) !important; /* Brutalist accent border */
            border-radius: 0 !important;
            color: #f8f8f2 !important; /* Bright accessible text */
            padding: 20px !important;
            box-shadow: 8px 8px 0px var(--sov-black) !important; /* Retaining brutalist shadow */
            font-family: 'Cascadia Code', 'Fira Code', Consolas, var(--sov-font-mono) !important;
            font-size: 1.05rem !important; /* Increased font-size */
            line-height: 1.6;
            overflow-x: auto;
        }
        
        code {
            padding: 2px 6px !important;
            background-color: var(--sov-paper) !important;
            color: var(--sov-black) !important;
            border: 2px solid var(--sov-black) !important;
            box-shadow: 2px 2px 0px var(--sov-red) !important;
            font-family: 'Cascadia Code', 'Fira Code', Consolas, var(--sov-font-mono) !important;
            font-size: 1rem !important; /* Slightly larger inline code */
            font-weight: bold;
        }
        
        /* Inside Pre blocks we revert inline code styling to keep it clean */
        pre > code {
            padding: 0 !important;
            background-color: transparent !important;
            color: inherit !important;
            border: none !important;
            box-shadow: none !important;
            font-weight: normal;
        }
        
        hr {
            border-top: 6px solid var(--sov-black) !important;
            border-bottom: 2px solid var(--sov-red) !important;
            border-left: none !important;
            border-right: none !important;
            width: 100% !important;
            margin: 50px 0 !important;
            height: 12px;
            background: transparent;
        }

        /* ── Footer ────────────────────────────────────────────────────── */
        footer {
            background-color: var(--sov-black) !important;
            border-top: 15px solid var(--sov-red) !important;
            padding-top: 60px !important;
            margin-top: 80px !important;
        }
        
        footer .copyright {
            font-family: var(--sov-font-mono) !important;
            color: var(--sov-white) !important;
            font-size: 1.1rem !important;
            text-transform: uppercase;
        }
        
        footer a { color: var(--sov-red) !important; box-shadow: none; font-family: var(--sov-font-head); letter-spacing: 1px;}
        footer a:hover { color: var(--sov-white) !important; background-color: var(--sov-red); }

        /* Pager buttons (Next/Prev) */
        .pager li > a {
            font-family: var(--sov-font-head) !important;
            color: var(--sov-white) !important;
            background-color: var(--sov-black) !important;
            border: 4px solid var(--sov-black) !important;
            border-radius: 0 !important;
            padding: 12px 25px !important;
            text-transform: uppercase !important;
            box-shadow: 6px 6px 0px var(--sov-red) !important;
            font-size: 1.4rem;
            transition: all 0.1s ease;
        }
        .pager li > a:hover {
            background-color: var(--sov-red) !important;
            border-color: var(--sov-black) !important;
            color: var(--sov-white) !important;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--sov-black) !important;
        }

        /* Profile image in sidebar/about */
        .short-about img {
            border-radius: 0 !important;
            border: 6px solid var(--sov-black) !important;
            box-shadow: 10px 10px 0 var(--sov-red) !important;
            filter: grayscale(100%) contrast(150%) !important;
            transition: filter 0.3s ease !important;
        }
        .short-about img:hover {
            filter: sepia(100%) hue-rotate(320deg) saturate(300%) contrast(150%) !important; /* Turns it stark red */
        }
        
        @media only screen and (max-width: 767px) {
            .intro-header {
                clip-path: polygon(0 0, 100% 0, 100% 95%, 0 100%);
            }
            .intro-header .site-heading h1, .intro-header .page-heading h1 {
                font-size: 3.5rem !important;
            }
        }
        
        /* ── Sidebar & About Area ──────────────────────────────────────── */
        .short-about p, .sidebar-container, .sidebar-container a {
            color: var(--sov-black) !important;
            font-family: var(--sov-font-mono) !important;
            font-size: 1rem !important;
            font-weight: bold;
        }

        /* Sidebar Tags & Buttons overriding default Hux CSS */
        .sidebar-container .tags a {
            border: 2px solid var(--sov-black) !important;
            box-shadow: 2px 2px 0px var(--sov-red) !important;
            padding: 4px 8px !important;
            font-size: 0.9rem !important;
        }
        
        /* Social Icons in Sidebar */
        .list-inline > li > a {
            color: var(--sov-white) !important;
            background-color: var(--sov-black) !important;
            border: 2px solid var(--sov-black) !important;
            border-radius: 0 !important;
            box-shadow: 4px 4px 0px var(--sov-red) !important;
            width: 45px !important;
            height: 45px !important;
            line-height: 40px !important;
            display: inline-block;
            transition: all 0.1s;
            margin-bottom: 5px;
        }
        
        .list-inline > li > a:hover {
            background-color: var(--sov-red) !important;
            box-shadow: -2px -2px 0px var(--sov-black) !important;
            transform: translate(2px, 2px);
        }
        
        /* Ensure FontAwesome icons inherit correctly */
        .list-inline > li > a > .fa-stack > .fa-circle,
        .list-inline > li > a > .fa-stack > i.fa-inverse {
            display: none !important; /* Hide original circles */
        }
        .list-inline > li > a > .fa-stack {
            background: none !important;
            height: auto !important;
            line-height: inherit !important;
            width: auto !important;
        }
        
        /* Bring back the actual icon without circle wrapper */
        .list-inline > li > a > .fa-stack::after {
            font-family: 'FontAwesome';
            content: "\f099"; /* default fallback */
            color: var(--sov-white);
            font-size: 1.2rem;
            position: static;
        }
        
        /* We can just reset .fa-stack to regular so child fa-* icons show up properly */
        .list-inline > li > a .fa-stack {
            line-height: 40px;
        }
        .list-inline > li > a .fa-circle {
            opacity: 0; /* hides the background circle so only the icon overlay remains */
        }
        .list-inline > li > a .fa-inverse {
            color: var(--sov-white) !important;
            font-size: 1.2rem;
        }

    </style>
</head>
