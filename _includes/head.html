    <!-- Cassette Futurism aesthetic overrides: True Hardware / Retro-Futurism style -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        :root {
            /* Authentic chunky hardware color palette */
            --cf-chassis-bg: #d9d2c6; /* Beige plastic */
            --cf-chassis-highlight: #ebe4d8;
            --cf-chassis-shadow: #b3ad9f;
            
            --cf-screen-bg: #161817; /* Dark panel */
            --cf-amber: #ff9d00;
            --cf-phosphor-green: #3fff00;
            --cf-alert-red: #ff3333;
            
            --cf-hard-border: #282a2b; /* Almost black */
            --cf-panel-border: #a49f8e;
            
            --cf-font-ui: 'Space Mono', monospace;
            --cf-font-data: 'VT323', monospace;
        }

        /* ── Base Reset & Body ─────────────────────────────────────────── */
        body {
            font-family: var(--cf-font-ui) !important;
            background-color: var(--cf-chassis-bg) !important;
            color: var(--cf-hard-border) !important;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* CRT overlay for subtle scanlines over everything */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            z-index: 9999;
        }

        /* ── Typography & Links ────────────────────────────────────────── */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--cf-font-ui) !important;
            font-weight: 700 !important;
            color: var(--cf-hard-border) !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        a {
            color: #005fcc !important;
            text-decoration: none !important;
            /* Underline to match terminal vibe */
            border-bottom: 2px solid transparent;            
            transition: all 0.1s;
        }

        a:hover, a:focus {
            color: #ff3333 !important;
            border-bottom: 2px solid #ff3333;
            background-color: rgba(255, 51, 51, 0.1);
        }

        /* ── Navbar: The Top Panel ─────────────────────────────────────── */
        .navbar-default, .navbar-custom {
            background-color: var(--cf-chassis-highlight) !important;
            border-bottom: 4px solid var(--cf-hard-border) !important;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1) !important;
            border-radius: 0 !important;
        }
        .navbar-brand {
            font-family: var(--cf-font-ui) !important;
            font-weight: 900 !important;
            color: var(--cf-hard-border) !important;
            background: var(--cf-amber);
            padding: 10px 15px !important;
            border: 2px solid var(--cf-hard-border) !important;
            box-shadow: 2px 2px 0 var(--cf-hard-border);
            margin-top: 5px !important;
        }
        .navbar-default .nav li a, .navbar-custom .nav li a {
            color: var(--cf-hard-border) !important;
            font-weight: 700 !important;
            text-transform: uppercase;
            border-radius: 0;
            border: 2px solid transparent;
        }
        .navbar-default .nav li a:hover, .navbar-custom .nav li a:hover {
            background-color: var(--cf-hard-border) !important;
            color: var(--cf-chassis-bg) !important;
            border: 2px solid var(--cf-hard-border);
        }

        /* ── Page Header / Intro ───────────────────────────────────────── */
        /* Turn the header into a dark LCD/CRT terminal display */
        .intro-header {
            background: var(--cf-screen-bg) !important;
            border-bottom: 4px solid var(--cf-hard-border);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            padding-bottom: 30px;
        }
        
        .intro-header::before {
            content: "SYSTEM OP_MODE: ONLINE";
            position: absolute;
            top: 10px; left: 15px;
            font-family: var(--cf-font-data);
            color: var(--cf-phosphor-green);
            font-size: 1.2rem;
            animation: blink 2s infinite;
        }

        .intro-header .site-heading, .intro-header .post-heading, .intro-header .page-heading {
            padding-top: 60px;
        }

        .intro-header .site-heading h1, .intro-header .post-heading h1, .intro-header .page-heading h1 {
            color: var(--cf-amber) !important;
            font-family: var(--cf-font-data) !important;
            font-size: 4.5rem !important;
            text-shadow: 0 0 8px rgba(255, 157, 0, 0.6);
            border-bottom: 2px solid var(--cf-amber);
            display: inline-block;
            padding-bottom: 5px;
        }

        .intro-header .subheading {
            color: var(--cf-phosphor-green) !important;
            font-family: var(--cf-font-data) !important;
            font-size: 2rem !important;
            margin-top: 15px;
            display: block;
            text-transform: uppercase;
        }
        
        /* ── Containers & Modules (Hardware aesthetic) ─────────────────── */
        /* Make tags, about, and posts look like tactile modules */
        .post-container, .post-preview, .one-tag-list, .sidebar-container section, .catalog-container {
            background-color: var(--cf-chassis-highlight) !important;
            border: 3px solid var(--cf-hard-border) !important;
            box-shadow: 6px 6px 0px rgba(40, 42, 43, 0.3) !important;
            border-radius: 0 !important; /* brutalist square edges */
            margin-bottom: 30px;
            padding: 25px;
            position: relative;
        }

        /* ── Post Previews (Listings) ──────────────────────────────────── */
        .post-preview:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px rgba(40, 42, 43, 0.4) !important;
        }
        
        .post-title {
            font-family: var(--cf-font-ui) !important;
            background: var(--cf-hard-border);
            color: var(--cf-chassis-highlight) !important;
            display: inline-block;
            padding: 5px 10px;
        }
        
        .post-meta {
            font-family: var(--cf-font-data) !important;
            font-size: 1.3rem !important;
            background: var(--cf-screen-bg);
            color: var(--cf-phosphor-green) !important;
            padding: 4px 8px;
            border: 2px inset #000;
            display: inline-block;
            margin-top: 15px;
        }

        .post-content-preview {
            color: #333 !important;
        }

        /* ── Tags Page Specifics ───────────────────────────────────────── */
        .tags a, #tag_cloud a {
            font-family: var(--cf-font-data) !important;
            font-size: 1.4rem !important;
            background: var(--cf-screen-bg) !important;
            color: var(--cf-amber) !important;
            border: 2px solid var(--cf-hard-border) !important;
            padding: 4px 10px;
            border-radius: 0 !important;
            box-shadow: 2px 2px 0 var(--cf-hard-border);
            margin: 0 8px 12px 0;
            display: inline-block;
        }
        
        .tags a:hover, #tag_cloud a:hover {
            background: var(--cf-amber) !important;
            color: var(--cf-screen-bg) !important;
            border-bottom: 2px solid var(--cf-hard-border) !important;
        }

        .one-tag-list {
            border-top: 12px solid var(--cf-hard-border) !important; /* Top vent look */
        }
        
        .one-tag-list .fa-tag {
            background: var(--cf-hard-border);
            color: var(--cf-chassis-bg);
            padding: 5px 15px;
            font-size: 1.5rem;
            margin-top: -30px;
            display: inline-block;
        }

        /* ── About Page & Inside Content ───────────────────────────────── */
        blockquote {
            background: #e1dacb !important;
            border-left: 6px solid var(--cf-alert-red) !important;
            color: var(--cf-hard-border) !important;
            font-family: var(--cf-font-ui) !important;
            padding: 15px;
            border-top: 2px solid var(--cf-panel-border);
            border-right: 2px solid var(--cf-panel-border);
            border-bottom: 2px solid var(--cf-panel-border);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }

        /* Code screens embedded in the chassis */
        code, pre {
            font-family: var(--cf-font-data) !important;
            background: var(--cf-screen-bg) !important;
            color: var(--cf-phosphor-green) !important;
            border: 4px inset #444 !important;
            border-radius: 0 !important;
            padding: 15px !important;
            font-size: 1.25rem;
        }
        
        hr {
            border-color: var(--cf-hard-border) !important;
            border-width: 3px !important;
            border-style: solid !important;
        }

        /* ── Footer ────────────────────────────────────────────────────── */
        footer {
            background-color: var(--cf-hard-border) !important;
            border-top: 6px solid var(--cf-amber) !important;
            padding-top: 40px !important;
            margin-top: 60px;
        }
        
        footer .copyright {
            font-family: var(--cf-font-data);
            color: #888 !important;
            font-size: 1.2rem;
        }
        
        footer a { color: var(--cf-chassis-bg) !important; }
        footer a:hover { color: var(--cf-amber) !important; background: transparent; }

        /* Pager buttons (Next/Prev) */
        .pager li > a {
            background: var(--cf-chassis-bg) !important;
            border: 3px solid var(--cf-hard-border) !important;
            color: var(--cf-hard-border) !important;
            font-family: var(--cf-font-ui);
            font-weight: 700;
            border-radius: 0 !important;
            box-shadow: 4px 4px 0 var(--cf-hard-border);
            text-transform: uppercase;
        }
        .pager li > a:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--cf-hard-border);
            background: var(--cf-amber) !important;
            color: var(--cf-hard-border) !important;
            border-bottom: 3px solid var(--cf-hard-border) !important;
        }

        /* Profile image in sidebar/about */
        .short-about img {
            border: 4px solid var(--cf-hard-border) !important;
            border-radius: 0 !important;
            box-shadow: 6px 6px 0 var(--cf-amber);
            filter: grayscale(100%) contrast(1.2);
            transition: filter 0.3s;
        }
        .short-about img:hover {
            filter: grayscale(0%);
        }

        /* Blinking cursor animation useful for data look */
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        
    </style>
</head>
