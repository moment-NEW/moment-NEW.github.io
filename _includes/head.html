    <!-- Bohemian / Earthy Aesthetic Overrides -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600&display=swap');

        :root {
            /* Bohemian Earthy Palette */
            --boho-bg: #f9f6f0;         /* Warm cream/linen */
            --boho-paper: #ffffff;      /* Pure white for cards */
            --boho-text: #4a4238;       /* Deep warm grey/brown */
            --boho-text-light: #7c7265; /* Muted brown */
            --boho-primary: #c27b5e;    /* Terracotta / Rust */
            --boho-secondary: #e8b072;  /* Mustard / Ochre */
            --boho-accent: #8b9987;     /* Sage Green */
            --boho-border: #e3dbce;     /* Soft warm border */

            --boho-font-head: 'Lora', serif;
            --boho-font-body: 'Nunito', sans-serif;
        }

        /* ── Base Reset & Body ─────────────────────────────────────────── */
        body {
            font-family: var(--boho-font-body) !important;
            background-color: var(--boho-bg) !important;
            color: var(--boho-text) !important;
            /* Subtle texture effect using repeating gradients */
            background-image:
                linear-gradient(45deg, rgba(194, 123, 94, 0.03) 25%, transparent 25%, transparent 75%, rgba(194, 123, 94, 0.03) 75%, rgba(194, 123, 94, 0.03)),
                linear-gradient(45deg, rgba(194, 123, 94, 0.03) 25%, transparent 25%, transparent 75%, rgba(194, 123, 94, 0.03) 75%, rgba(194, 123, 94, 0.03));
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }
        
        body::after {
            display: none !important;
        }

        /* ── Typography & Links ────────────────────────────────────────── */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--boho-font-head) !important;
            color: var(--boho-text) !important;
            font-weight: 600 !important;
            letter-spacing: 0.02em;
            text-transform: none;
        }

        a {
            color: var(--boho-primary) !important;
            text-decoration: none !important;
            transition: color 0.3s ease, text-decoration 0.3s ease;
            border-bottom: none;
            background-color: transparent;
        }

        a:hover, a:focus {
            color: var(--boho-secondary) !important;
            text-decoration: underline !important;
            text-decoration-color: var(--boho-secondary) !important;
            text-underline-offset: 4px;
            background-color: transparent !important;
            border-bottom: none !important;
        }

        /* ── Navbar ────────────────────────────────────────────────────── */
        .navbar-default, .navbar-custom {
            background-color: rgba(249, 246, 240, 0.95) !important;
            border-bottom: 1px solid var(--boho-border) !important;
            box-shadow: 0 2px 10px rgba(74, 66, 56, 0.05) !important;
        }
        .navbar-brand {
            font-family: var(--boho-font-head) !important;
            color: var(--boho-primary) !important;
            font-weight: 600 !important;
            font-size: 1.4rem;
            text-transform: none;
            letter-spacing: 0.05em;
            background: transparent !important;
            padding: 15px !important;
            border: none !important;
            box-shadow: none !important;
            margin-top: 0 !important;
        }
        .navbar-default .nav li a, .navbar-custom .nav li a {
            color: var(--boho-text-light) !important;
            font-family: var(--boho-font-body);
            font-weight: 600 !important;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.85rem;
            border: none !important;
        }
        .navbar-default .nav li a:hover, .navbar-custom .nav li a:hover {
            color: var(--boho-primary) !important;
            background-color: transparent !important;
            border: none !important;
        }

        /* ── Page Header / Intro ───────────────────────────────────────── */
        .intro-header {
            position: relative;
            background-color: #8b9987 !important; /* Sage green fallback */
            background-blend-mode: overlay !important;
            border-bottom: none !important;
            /* Arch shape at the bottom */
            border-radius: 0 0 50% 50% / 0 0 15% 15%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;
            margin-bottom: 40px;
            padding-bottom: 50px;
        }
        
        .intro-header::before {
            display: none !important;
        }

        .intro-header .site-heading, .intro-header .post-heading, .intro-header .page-heading {
            padding-top: 60px;
        }

        .intro-header .site-heading h1, .intro-header .post-heading h1, .intro-header .page-heading h1 {
            font-family: var(--boho-font-head) !important;
            color: #fff !important;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.2) !important;
            font-size: 3.5rem !important;
            font-style: italic;
            border-bottom: none !important;
            display: block;
        }

        .intro-header .subheading {
            font-family: var(--boho-font-body) !important;
            color: #fdfbf7 !important;
            font-weight: 300 !important;
            letter-spacing: 0.05em;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2) !important;
            font-size: 1.5rem !important;
            margin-top: 10px;
            text-transform: none !important;
        }
        
        /* ── Content Cards (Posts, Tags, About) ────────────────────────── */
        .post-container, .post-preview, .one-tag-list, .sidebar-container section, .catalog-container {
            background-color: var(--boho-paper) !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 20px rgba(74, 66, 56, 0.06) !important;
            border: 1px solid var(--boho-border) !important;
            padding: 30px !important;
            margin-bottom: 30px !important;
            transition: transform 0.3s ease, box-shadow 0.3s ease !important;
        }

        /* ── Post Previews (Listings) ──────────────────────────────────── */
        .post-preview:hover {
            transform: translateY(-5px) !important;
            box-shadow: 0 8px 25px rgba(74, 66, 56, 0.1) !important;
        }
        
        .post-title {
            font-family: var(--boho-font-head) !important;
            color: var(--boho-text) !important;
            font-size: 1.8rem !important;
            background: transparent !important;
            display: block !important;
            padding: 0 !important;
        }
        
        .post-subtitle {
            color: var(--boho-text-light) !important;
            font-family: var(--boho-font-body) !important;
            font-weight: 400 !important;
        }
        
        .post-meta {
            color: var(--boho-accent) !important;
            font-style: italic;
            font-family: var(--boho-font-head) !important;
            background: transparent !important;
            padding: 0 !important;
            border: none !important;
            font-size: 1.1rem !important;
            margin-top: 10px !important;
        }

        .post-content-preview {
            color: var(--boho-text-light) !important;
            line-height: 1.7;
        }

        /* ── Tags Page Specifics ───────────────────────────────────────── */
        .tags a, #tag_cloud a {
            background-color: #fdfbf7 !important;
            color: var(--boho-text-light) !important;
            border: 1px solid var(--boho-border) !important;
            border-radius: 20px !important;
            padding: 6px 15px !important;
            font-family: var(--boho-font-body) !important;
            font-size: 0.9rem !important;
            margin: 0 8px 10px 0 !important;
            display: inline-block !important;
            box-shadow: none !important;
            transition: all 0.3s ease !important;
        }
        
        .tags a:hover, #tag_cloud a:hover {
            background-color: var(--boho-secondary) !important;
            color: #fff !important;
            border-color: var(--boho-secondary) !important;
            border-bottom: 1px solid var(--boho-secondary) !important;
        }

        .one-tag-list {
            border-top: 1px solid var(--boho-border) !important;
        }
        
        .one-tag-list .fa-tag {
            background-color: var(--boho-bg) !important;
            font-size: 1.2rem !important;
            border: none !important;
            padding: 0 10px !important;
            color: var(--boho-primary) !important;
            margin-top: -38px !important;
            display: inline-block !important;
        }

        /* ── Markdown/Prose Styling ────────────────────────────────────── */
        blockquote {
            font-family: var(--boho-font-head) !important;
            font-style: italic;
            color: var(--boho-text-light) !important;
            border-left: 3px solid var(--boho-accent) !important;
            background-color: rgba(139, 153, 135, 0.05) !important;
            padding: 15px 20px !important;
            border-radius: 0 8px 8px 0 !important;
            border-top: none !important;
            border-right: none !important;
            border-bottom: none !important;
            box-shadow: none !important;
            margin: 20px 0 !important;
        }

        /* Code screens */
        code, pre {
            background-color: #fcfcfc !important;
            border: 1px solid var(--boho-border) !important;
            border-radius: 8px !important;
            color: var(--boho-text) !important;
            padding: 15px !important;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02) !important;
            font-family: 'Courier New', Courier, monospace !important;
            font-size: 0.95rem !important;
        }
        
        code {
            padding: 2px 4px !important;
            background-color: #f4f0e6 !important;
            color: var(--boho-primary) !important;
            border: none !important;
            box-shadow: none !important;
        }
        
        hr {
            border-top: 1px solid var(--boho-border) !important;
            border-bottom: none !important;
            border-left: none !important;
            border-right: none !important;
            width: 50% !important;
            margin: 40px auto !important;
            border-style: solid !important;
        }

        /* ── Footer ────────────────────────────────────────────────────── */
        footer {
            background-color: var(--boho-bg) !important;
            border-top: 1px solid var(--boho-border) !important;
            padding-top: 50px !important;
            margin-top: 40px !important;
        }
        
        footer .copyright {
            font-family: var(--boho-font-body) !important;
            color: var(--boho-text-light) !important;
            font-size: 1rem !important;
        }
        
        footer a { color: var(--boho-primary) !important; }
        footer a:hover { color: var(--boho-secondary) !important; text-decoration: underline !important; }

        /* Pager buttons (Next/Prev) */
        .pager li > a {
            font-family: var(--boho-font-body) !important;
            color: var(--boho-text) !important;
            background-color: var(--boho-paper) !important;
            border: 1px solid var(--boho-border) !important;
            border-radius: 25px !important;
            padding: 10px 20px !important;
            text-transform: none !important;
            box-shadow: none !important;
            font-weight: normal !important;
        }
        .pager li > a:hover {
            background-color: var(--boho-primary) !important;
            color: #fff !important;
            border-color: var(--boho-primary) !important;
            text-decoration: none !important;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Profile image in sidebar/about */
        .short-about img {
            border-radius: 50% !important;
            border: 4px solid var(--boho-paper) !important;
            box-shadow: 0 4px 15px rgba(74, 66, 56, 0.15) !important;
            filter: sepia(20%) !important;
            transition: filter 0.3s ease !important;
        }
        .short-about img:hover {
            filter: sepia(0%) !important;
        }
        
        @media only screen and (max-width: 767px) {
            .intro-header {
                border-radius: 0 0 20% 20% / 0 0 5% 5% !important;
            }
        }
    </style>
</head>
