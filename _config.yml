# Site settings
title: MOMENTS Blog
SEOTitle: 陈某人的应许之地 | MT Blog
header-img: img/post-bg-desk.jpg
email: 1838088566@qq.com
description: "Every failure is leading towards success."
keyword: "MOMENTS Blog, 嵌入式, 系统编程, 学习笔记, Jekyll"
url: "http://moment-NEW.github.io"          # your host, for absolute URL
baseurl: ""      # for example, '/blog' if your blog hosted on 'host/blog'
github_repo: "https://github.com/moment-NEW/moment-NEW.github.io" # you code repository

# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: "人类…一定要珍惜自己的羁绊。"
sidebar-avatar: /img/spike.jpg      # use absolute URL, seeing it's used in both `/` and `/about/`



# SNS settings
RSS: false
zhihu_username: ""
github_username:    moment-NEW
facebook_username: ""
jianshu_username: ""
#twitter_username: ""




# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
permalink: pretty
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md"]
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`



# Gems
# from PR#40, to support local preview for Jekyll 3.0
gems: [jekyll-paginate]




# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM                            # use Github Flavored Markdown !important



# 评论系统
# Disqus（https://disqus.com/）
# disqus_username: ""

# Gitalk
gitalk:
  enable: true    #是否开启Gitalk评论
  clientID: ""                          #生成的clientID
  clientSecret: ""                      #生成的clientSecret
  repo: moment-NEW.github.io             #仓库名称
  owner: moment-NEW                      #github用户名
  admin: moment-NEW
  distractionFreeMode: true #是否启用类似FB的阴影遮罩


# 统计

# Analytics settings
# Baidu Analytics
ba_track_id: ""

# Google Analytics
ga_track_id: ""         # Format: UA-xxxxxx-xx
ga_domain: auto          # 默认的是 auto, 这里我是自定义了的域名，你如果没有自己的域名，需要改成auto





# Featured Tags
featured-tags: true                     # 是否使用首页标签
featured-condition-size: 1              # 相同标签数量大于这个数，才会出现在首页



# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true



# Friends
friends: [
    {
        title: "GitHub Pages",
        href: "https://pages.github.com"
    },{
        title: "Jekyll",
        href: "https://jekyllrb.com"
    },{
        title: "GitHub",
        href: "https://github.com"
    }
]
